<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP Police Matrix | RAG Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #111111;
            --accent-primary: #8b5cf6;
            --accent-secondary: #d946ef;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #262626;
            --glass-bg: rgba(17, 17, 17, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(217, 70, 239, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Search Section */
        .search-container {
            position: sticky;
            top: 2rem;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            padding: 0.75rem;
            display: flex;
            gap: 0.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease-out;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1.1rem;
            padding: 0.5rem 1rem;
        }

        button {
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Result Section */
        #result-content {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .answer-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .answer-card h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
        }

        .answer-text {
            font-size: 1.15rem;
            color: var(--text-main);
            white-space: pre-wrap;
        }

        /* Sources Grid */
        .sources-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .source-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.25rem;
            transition: background 0.3s;
        }

        .source-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-primary);
        }

        .source-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .source-tag {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            background: rgba(139, 92, 246, 0.2);
            color: var(--accent-primary);
            border-radius: 0.5rem;
            font-weight: 600;
        }

        .source-score {
            font-size: 0.75rem;
            color: #10b981;
            font-weight: 700;
        }

        .source-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .source-info span {
            color: var(--text-main);
            font-weight: 500;
        }

        .source-link {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--accent-secondary);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .source-link:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        /* Loading Spinner */
        .loader {
            display: none;
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(139, 92, 246, 0.1);
            border-top: 3px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .search-container { border-radius: 1rem; flex-direction: column; }
            button { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>UP Police Matrix</h1>
        <p>Intelligence RAG Assistant (Privacy-First / Local LLM Powered)</p>
    </header>

    <div class="search-container">
        <input type="text" id="queryInput" placeholder="Ask about incidents, topics, or districts..." autofocus>
        <button id="searchBtn">
            <span id="btnText">Ask Assistant</span>
        </button>
    </div>

    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p>Analyzing intelligence database...</p>
    </div>

    <div id="result-content">
        <div class="answer-card">
            <h2>Intelligence Report</h2>
            <div id="answerText" class="answer-text"></div>
        </div>

        <div class="sources-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            Retrieved Sources
        </div>
        <div id="sourcesGrid" class="sources-grid">
            <!-- Source cards will be injected here -->
        </div>
    </div>
</div>

<script>
    const queryInput = document.getElementById('queryInput');
    const searchBtn = document.getElementById('searchBtn');
    const loader = document.getElementById('loader');
    const resultContent = document.getElementById('result-content');
    const answerText = document.getElementById('answerText');
    const sourcesGrid = document.getElementById('sourcesGrid');

    async function handleSearch() {
        const question = queryInput.value.trim();
        if (!question) return;

        // Reset UI
        resultContent.style.display = 'none';
        loader.style.display = 'block';
        searchBtn.disabled = true;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.detail || 'Failed to fetch response');
            }

            const data = await response.json();
            
            // Render Answer
            answerText.textContent = data.answer;

            // Render Sources
            sourcesGrid.innerHTML = '';
            data.sources.forEach(src => {
                const card = document.createElement('div');
                card.className = 'source-card';
                card.innerHTML = `
                    <div class="source-header">
                        <span class="source-tag">${src.category || 'General'}</span>
                        <span class="source-score">${Math.round(src.score * 100)}% Match</span>
                    </div>
                    <div class="source-info">Source: <span>${src.source || 'Unknown'}</span></div>
                    <div class="source-info">District: <span>${src.district || 'N/A'}</span></div>
                    <div class="source-info">Date: <span>${src.timestamp || 'N/A'}</span></div>
                    ${src.url ? `<a href="${src.url}" target="_blank" class="source-link">View Original Post →</a>` : ''}
                `;
                sourcesGrid.appendChild(card);
            });

            loader.style.display = 'none';
            resultContent.style.display = 'block';
        } catch (error) {
            console.error(error);
            alert('Error: ' + error.message);
            loader.style.display = 'none';
        } finally {
            searchBtn.disabled = false;
        }
    }

    searchBtn.addEventListener('click', handleSearch);
    queryInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSearch();
    });
</script>

</body>
</html>
